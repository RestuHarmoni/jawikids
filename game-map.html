<!doctype html>
<html lang="ms">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Peta Pulau Jawi</title>
  <link rel="stylesheet" href="app.css">
</head>
<body class="bg-bubbles map-page">
  <div class="page map-page-shell">
    <header class="topbar map-topbar">
      <a class="brand" href="index.html">
        <span class="brand-badge">🏝️</span>
        <span class="brand-title"><b>Pulau Jawi</b><span>Peta Pengembaraan</span></span>
      </a>
      <nav class="nav-actions">
        <a class="btn" href="parent-dashboard.html">Dashboard</a>
        <button class="btn btn-blue" onclick="document.body.classList.toggle('hide-ui')">Minimal View</button>
      </nav>
    </header>

    <main class="map-shell card">
      <section class="map-hero-title">
        <span class="eyebrow">🗺️ Peta Dunia Pulau Jawi</span>
        <h1>Pilih Pulau Pengembaraan</h1>
        <p>Laluan putus-putus akan bawa anak dari Pulau Huruf ke Istana Pendekar Jawi. Avatar akan muncul di pulau semasa.</p>
      </section>

      <section class="real-map-stage" id="realMapStage" aria-label="Peta Pulau Jawi">
        <div class="ocean-layer ocean-a"></div>
        <div class="ocean-layer ocean-b"></div>
        <div class="sun-real"><span></span></div>
        <div class="cloud-real c1"><i></i><i></i><i></i></div>
        <div class="cloud-real c2"><i></i><i></i><i></i></div>
        <div class="cloud-real c3"><i></i><i></i><i></i></div>
        <div class="birds b1">⌁⌁</div>
        <div class="birds b2">⌁⌁⌁</div>

        <svg class="island-route" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
          <path id="routePath" d="M 11 23 C 22 28, 22 42, 32 43 S 47 24, 57 25 S 63 45, 75 42 S 88 50, 86 65 S 67 66, 63 76 S 45 83, 37 69 S 19 71, 18 83 S 43 91, 59 90 S 75 87, 79 81" />
        </svg>

        <div class="map-legend">
          <span><i class="dot open"></i> Dibuka</span>
          <span><i class="dot current"></i> Semasa</span>
          <span><i class="dot locked"></i> Terkunci</span>
        </div>
      </section>
    </main>

    <div class="quick-fab"><button class="btn btn-primary" onclick="document.body.classList.toggle('hide-ui')">☰</button></div>
  </div>

  <script src="js/pulau-jawi-data.js"></script>
  <script src="js/pulau-jawi-effects.js"></script>
  <script>
    const stage = document.getElementById('realMapStage');
    const positions = [
      [5,16],[25,35],[49,14],[69,31],[79,52],
      [58,60],[32,49],[12,70],[38,79],[65,76]
    ];
    const unlocked = Number(localStorage.getItem('pulauJawiUnlocked') || 4);
    const currentIsland = Number(localStorage.getItem('pulauJawiCurrentIsland') || Math.min(unlocked, 4));

    function islandShape(index){
      const shapes = ['shape-a','shape-b','shape-c','shape-d'];
      return shapes[index % shapes.length];
    }

    function makeIsland(item, idx){
      const id = Number(item.id);
      const isOpen = id <= unlocked;
      const isCurrent = id === currentIsland;
      const island = document.createElement(isOpen ? 'a' : 'div');
      island.className = `real-island ${islandShape(idx)} ${isOpen ? 'is-open' : 'is-locked'} ${isCurrent ? 'is-current' : ''}`;
      if(isOpen) island.href = `lesson-game.html?island=${id}`;
      island.style.left = positions[idx][0] + '%';
      island.style.top = positions[idx][1] + '%';
      island.style.setProperty('--c1', item.c1 || '#b9f55f');
      island.style.setProperty('--c2', item.c2 || '#50d86e');
      island.style.setProperty('--delay', (idx * .16) + 's');
      island.innerHTML = `
        <div class="island-shadow"></div>
        <div class="island-body">
          <div class="sand-ring"></div>
          <div class="grass-cap"></div>
          <div class="island-trees"><span>🌴</span><span>🌳</span></div>
          <div class="island-house">${idx % 3 === 0 ? '🏡' : idx % 3 === 1 ? '⛺' : '🏰'}</div>
          <div class="island-lock">🔒</div>
          <div class="current-glow"></div>
        </div>
        <div class="island-label">
          <b>Pulau ${id}</b>
          <span>${item.game}</span>
        </div>
      `;
      if(isOpen){
        island.addEventListener('mouseenter', () => { try{ playBlip(); }catch(e){} });
        island.addEventListener('click', () => {
          localStorage.setItem('pulauJawiCurrentIsland', id);
          try{ playSparkle(); }catch(e){}
        });
      }
      stage.appendChild(island);

      if(isCurrent){
        const avatar = document.createElement('div');
        avatar.className = 'map-current-avatar';
        avatar.innerHTML = `<img src="assets/characters/zafri-main.svg" alt="Avatar anak"><span>Saya di sini!</span>`;
        island.appendChild(avatar);
      }
    }

    (PULAU_JAWI_DATA?.islands || []).slice(0,10).forEach(makeIsland);
  </script>
</body>
</html>
