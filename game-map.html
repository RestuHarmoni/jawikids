    *{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:Nunito,system-ui,-apple-system,Segoe UI,sans-serif;color:var(--navy);background:#dff8ff;overflow-x:hidden}body{background:radial-gradient(circle at 20% 0%,#fff8bd 0 8%,transparent 20%),linear-gradient(180deg,#dff8ff 0%,#bff2ff 40%,#e9fbff 100%)}

    .world{position:relative;height:min(680px,calc(100vh - 150px));min-height:490px;border-radius:30px;overflow:hidden;border:6px solid #fff;background:linear-gradient(180deg,#9eedff 0 27%,#57d1ff 45%,#1594db 100%);box-shadow:inset 0 -40px 80px rgba(0,81,139,.22),0 20px 35px rgba(24,49,83,.14);isolation:isolate}.world:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 22% 22%,rgba(255,255,255,.55) 0 2%,transparent 8%),radial-gradient(circle at 72% 42%,rgba(255,255,255,.36) 0 1.5%,transparent 7%);z-index:1}.wave{position:absolute;left:-20%;right:-20%;height:130px;background:repeating-radial-gradient(ellipse at center,rgba(255,255,255,.48) 0 8px,transparent 9px 38px);opacity:.55;z-index:2;animation:wave 18s linear infinite}.wave.one{bottom:15px;transform:rotate(-3deg)}.wave.two{top:210px;opacity:.26;animation-direction:reverse;animation-duration:25s}.wave.three{top:390px;opacity:.2;animation-duration:32s}.sun{position:absolute;right:34px;top:26px;width:112px;height:112px;border-radius:50%;background:radial-gradient(circle,#fff8b8 0 19%,#ffd84d 42%,#ffaf2e 72%);box-shadow:0 0 0 17px rgba(255,216,77,.24),0 0 80px rgba(255,176,46,.7);z-index:4;animation:happySun 4s ease-in-out infinite}.sun:before,.sun:after{content:"";position:absolute;background:var(--navy);border-radius:999px;top:42px;width:10px;height:14px}.sun:before{left:34px;box-shadow:33px 0 0 var(--navy)}.sun:after{left:43px;top:66px;width:30px;height:16px;background:transparent;border-bottom:6px solid var(--navy);border-radius:0 0 30px 30px}.cloud{position:absolute;width:140px;height:58px;z-index:5;animation:cloud 12s ease-in-out infinite;filter:drop-shadow(0 8px 6px rgba(24,49,83,.08))}.cloud i{position:absolute;bottom:0;background:#fff;border-radius:999px}.cloud i:nth-child(1){left:0;width:76px;height:43px}.cloud i:nth-child(2){left:42px;bottom:12px;width:70px;height:62px}.cloud i:nth-child(3){right:0;width:82px;height:45px}.c1{left:7%;top:10%}.c2{left:47%;top:8%;transform:scale(.82);animation-delay:1.8s}.c3{right:8%;top:28%;transform:scale(.66);animation-delay:3.6s}.bird{position:absolute;z-index:6;color:#173153;font-size:30px;font-weight:1000;letter-spacing:-8px;opacity:.62;animation:bird 5s ease-in-out infinite}.b1{left:30%;top:14%}.b2{right:18%;top:18%;font-size:25px;animation-delay:1.1s}.b3{left:11%;top:35%;font-size:22px;animation-delay:2.3s}.route{position:absolute;inset:0;z-index:8;pointer-events:none;filter:drop-shadow(0 7px 2px rgba(0,72,120,.18))}.route path{fill:none;stroke:#fff6d5;stroke-width:8;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:1 18;animation:dash 2s linear infinite}.route .shadow{stroke:rgba(19,70,112,.22);stroke-width:13;stroke-dasharray:none;animation:none}.island{position:absolute;width:150px;height:110px;z-index:12;transform:translate(-50%,-50%);text-decoration:none;color:var(--navy);animation:floatIsland 3.8s ease-in-out infinite;transition:.22s ease;cursor:pointer}.island:hover{z-index:50;filter:brightness(1.04);transform:translate(-50%,-58%) scale(1.05)}.island.locked{filter:grayscale(.48) saturate(.7);cursor:not-allowed}.island.locked:hover{transform:translate(-50%,-50%)}.shadow{position:absolute;left:18px;right:18px;bottom:-20px;height:37px;border-radius:50%;background:rgba(0,70,115,.26);filter:blur(5px)}.land{position:absolute;inset:0;border:5px solid #fff;border-radius:54% 46% 58% 42%;background:linear-gradient(180deg,#ffe6a7 0 21%,#e9bd68 22% 34%,#2ecc68 35% 100%);box-shadow:inset 0 -14px 0 rgba(10,111,60,.18),0 12px 0 #bf8c4f,0 25px 30px rgba(24,49,83,.18);overflow:hidden}.island:nth-of-type(3n) .land{border-radius:42% 58% 46% 54%;transform:rotate(2deg)}.island:nth-of-type(4n) .land{border-radius:62% 38% 52% 48%;transform:rotate(-2deg)}.land:before{content:"";position:absolute;inset:8px;border-radius:inherit;background:linear-gradient(160deg,var(--islandA,#9cf45b),var(--islandB,#31c76c));top:28px;box-shadow:inset 0 -13px rgba(10,111,60,.18)}.land:after{content:"";position:absolute;left:-12px;right:-12px;top:4px;height:32px;background:linear-gradient(180deg,#fff0b7,#ffd177);border-radius:50%;opacity:.95}.tree{position:absolute;font-size:28px;z-index:4;filter:drop-shadow(0 5px 4px rgba(0,0,0,.14));animation:tree 2s ease-in-out infinite}.t1{left:21px;top:16px}.t2{right:22px;top:31px;animation-delay:.35s}.hut{position:absolute;z-index:5;left:54px;top:38px;font-size:32px;filter:drop-shadow(0 7px 5px rgba(0,0,0,.12));animation:pop 3s ease-in-out infinite}.num{position:absolute;left:50%;top:-14px;transform:translateX(-50%);z-index:7;width:34px;height:34px;border-radius:50%;display:grid;place-items:center;background:#fff;border:4px solid var(--sun);box-shadow:0 8px 15px rgba(24,49,83,.12);font-weight:1000}.label{position:absolute;left:50%;bottom:-48px;transform:translateX(-50%);width:142px;background:rgba(255,255,255,.94);border:3px solid #fff;border-radius:20px;padding:7px;text-align:center;box-shadow:0 12px 20px rgba(24,49,83,.13);z-index:20}.label b{display:block;font-size:13px}.label span{display:block;font-size:10px;font-weight:1000;color:#5d7288;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.lock{display:none;position:absolute;inset:0;z-index:10;background:rgba(64,78,95,.36);backdrop-filter:blur(1px);border-radius:inherit;place-items:center;font-size:40px}.locked .lock{display:grid}.current .land{box-shadow:inset 0 -14px 0 rgba(10,111,60,.18),0 12px 0 #bf8c4f,0 0 0 10px rgba(255,216,77,.35),0 25px 30px rgba(24,49,83,.2)}.current-ring{display:none;position:absolute;inset:-12px;border:6px dashed #fff069;border-radius:55% 45% 55% 45%;z-index:6;animation:spin 8s linear infinite}.current .current-ring{display:block}.avatar-here{position:absolute;left:50%;top:-92px;transform:translateX(-50%);z-index:30;display:none;place-items:center;animation:avatar 1.3s ease-in-out infinite}.current .avatar-here{display:grid}.avatar-here img{width:76px;filter:drop-shadow(0 12px 8px rgba(24,49,83,.25))}.speech{margin-top:-7px;background:#fff;border:3px solid #ffd84d;border-radius:999px;padding:5px 9px;font-size:10px;font-weight:1000;white-space:nowrap;box-shadow:0 8px 14px rgba(24,49,83,.13)}.legend{position:absolute;left:15px;bottom:13px;z-index:60;display:flex;gap:8px;flex-wrap:wrap;background:rgba(255,255,255,.84);border:3px solid #fff;border-radius:999px;padding:9px 12px;box-shadow:0 10px 20px rgba(24,49,83,.12);font-size:12px;font-weight:1000}.legend i{width:12px;height:12px;border-radius:50%;display:inline-block;margin-right:5px}.open-dot{background:#22c55e}.cur-dot{background:#f59e0b;box-shadow:0 0 0 5px rgba(245,158,11,.25)}.lock-dot{background:#94a3b8}.hidden-ui .pj-title,.hidden-ui .pj-top{display:none}.hidden-ui .world{height:calc(100vh - 34px)}
    @keyframes wave{to{transform:translateX(12%) rotate(-3deg)}}@keyframes happySun{50%{transform:translateY(7px) scale(1.04)}}@keyframes cloud{50%{transform:translateX(24px)}}@keyframes bird{50%{transform:translate(16px,-8px) rotate(-7deg)}}@keyframes dash{to{stroke-dashoffset:-38}}@keyframes floatIsland{50%{margin-top:-8px}}@keyframes tree{50%{transform:rotate(7deg)}}@keyframes pop{50%{transform:translateY(-4px) scale(1.08)}}@keyframes spin{to{transform:rotate(360deg)}}@keyframes avatar{50%{transform:translateX(-50%) translateY(-8px)}}
    @media(max-width:760px){.pj-wrap{padding:8px}.pj-top{gap:6px}.pj-brand{padding:7px 9px;border-radius:18px}.pj-logo{width:38px;height:38px;font-size:23px}.pj-brand b{font-size:15px}.pj-actions .pj-btn{padding:10px 12px;font-size:12px}.pj-panel{border-radius:24px;padding:6px}.world{height:calc(100vh - 130px);min-height:455px;border-radius:24px;border-width:5px}.pj-title h1{font-size:28px}.pj-title p{display:none}.sun{width:70px;height:70px;right:14px;top:18px}.sun:before{left:20px;top:27px;width:7px;height:10px;box-shadow:22px 0 0 var(--navy)}.sun:after{left:27px;top:43px;width:19px;height:9px;border-bottom-width:4px}.cloud{transform:scale(.62)}.c2{display:none}.route path{stroke-width:7}.island{width:96px;height:72px}.tree{font-size:18px}.t1{left:12px;top:10px}.t2{right:13px;top:20px}.hut{left:35px;top:24px;font-size:20px}.num{width:27px;height:27px;font-size:12px;top:-11px;border-width:3px}.label{width:92px;bottom:-36px;border-radius:15px;padding:4px}.label b{font-size:11px}.label span{font-size:8px}.avatar-here{top:-67px}.avatar-here img{width:50px}.speech{font-size:8px;padding:3px 6px}.legend{left:7px;right:7px;bottom:7px;border-radius:18px;justify-content:center;font-size:10px}.bird{font-size:20px}}
    @media(orientation:landscape) and (max-height:560px){.pj-wrap{padding:6px}.pj-title{display:none}.pj-top{margin-bottom:6px}.world{height:calc(100vh - 78px);min-height:330px}.island{width:84px;height:62px}.label{bottom:-31px;width:84px;padding:3px;border-radius:12px}.label b{font-size:9px}.label span{font-size:7px}.sun{width:62px;height:62px}.cloud{transform:scale(.52)}}

<body data-jk-orientation="game">
<div class="pj-wrap">
  <header class="pj-top">
    <a class="pj-brand" href="index.html"><span class="pj-logo">🏝️</span><span><b>Pulau Jawi</b><span>Peta Pengembaraan Anak</span></span></a>
    <div class="pj-actions"><a class="pj-btn" href="parent-dashboard.html">Dashboard</a><button class="pj-btn primary" id="miniBtn">Minimal View</button></div>
  </header>
  <main class="pj-panel">
    <section class="pj-title"><div class="badge">🗺️ 10 Pulau Jawi • Umur 5–8 Tahun</div><h1>Jelajah Laut Jawi!</h1><p>Ikut laluan putus-putus dari pulau ke pulau. Avatar anak akan berada di pulau semasa yang telah dibuka.</p></section>
    <section class="world" id="world" aria-label="Peta Pulau Jawi">
      <div class="wave one"></div><div class="wave two"></div><div class="wave three"></div><div class="sun"></div>
      <div class="cloud c1"><i></i><i></i><i></i></div><div class="cloud c2"><i></i><i></i><i></i></div><div class="cloud c3"><i></i><i></i><i></i></div>
      <div class="bird b1">⌁⌁</div><div class="bird b2">⌁⌁⌁</div><div class="bird b3">⌁⌁</div>
      <svg class="route" viewBox="0 0 1200 680" preserveAspectRatio="none"><path class="shadow" d="M90 190 C190 110 300 110 410 205 C500 285 640 115 745 115 C865 120 900 210 990 215 C1085 265 1110 390 1010 450 C925 520 840 575 800 570 C700 555 650 465 560 460 C445 460 425 585 325 585 C210 580 170 505 115 455"/><path d="M90 190 C190 110 300 110 410 205 C500 285 640 115 745 115 C865 120 900 210 990 215 C1085 265 1110 390 1010 450 C925 520 840 575 800 570 C700 555 650 465 560 460 C445 460 425 585 325 585 C210 580 170 505 115 455"/></svg>
      <div class="legend"><span><i class="open-dot"></i>Dibuka</span><span><i class="cur-dot"></i>Semasa</span><span><i class="lock-dot"></i>Terkunci</span></div>
    </section>
  </main>
</div>
<script>
const islands=[
{id:1,name:'Huruf Ajaib',game:'Pop Huruf',x:8,y:28,mx:8,my:36,a:'#b9f55f',b:'#37c96e',icon:'🏡'},
{id:2,name:'Gua Bunyi',game:'Dengar & Pilih',x:25,y:17,mx:25,my:20,a:'#8ef2ff',b:'#22b8e9',icon:'⛺'},
{id:3,name:'Hutan Padanan',game:'Match Card',x:42,y:30,mx:43,my:38,a:'#c4b5fd',b:'#8b5cf6',icon:'🌈'},
{id:4,name:'Sungai Huruf',game:'Tangkap Huruf',x:62,y:17,mx:62,my:22,a:'#7dd3fc',b:'#0ea5e9',icon:'🚣'},
{id:5,name:'Istana Suku Kata',game:'Susun Suku Kata',x:83,y:32,mx:83,my:40,a:'#fde68a',b:'#f59e0b',icon:'🏰'},
{id:6,name:'Kampung Perkataan',game:'Cari Perkataan',x:84,y:66,mx:90,my:70,a:'#fbcfe8',b:'#ec4899',icon:'🏡'},
{id:7,name:'Taman Jawi',game:'Memory Jawi',x:67,y:84,mx:72,my:84,a:'#bbf7d0',b:'#22c55e',icon:'🌳'},
{id:8,name:'Gunung Cabaran',game:'Teka Perkataan',x:47,y:68,mx:52,my:64,a:'#fed7aa',b:'#f97316',icon:'⛰️'},
{id:9,name:'Kota Hikmah',game:'Susun Ayat',x:27,y:86,mx:33,my:84,a:'#ddd6fe',b:'#7c3aed',icon:'🕌'},
{id:10,name:'Istana Pendekar',game:'Boss Battle',x:10,y:67,mx:13,my:66,a:'#fff7ad',b:'#facc15',icon:'👑'}
];
const world=document.getElementById('world');
const unlocked=Number(localStorage.getItem('pulauJawiUnlocked')||4);
const current=Number(localStorage.getItem('pulauJawiCurrentIsland')||Math.min(unlocked,4));
function beep(type='tap'){try{const A=window.AudioContext||window.webkitAudioContext;const ctx=new A();const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.value=type==='ok'?880:520;g.gain.setValueAtTime(.001,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.08,ctx.currentTime+.015);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.14);o.start();o.stop(ctx.currentTime+.16)}catch(e){}}
islands.forEach((it,i)=>{const open=it.id<=unlocked,cur=it.id===current;const el=document.createElement(open?'a':'div');el.className='island '+(open?'open':'locked')+' '+(cur?'current':'');if(open)el.href='lesson-game.html?island='+it.id;el.dataset.x=it.x;el.dataset.y=it.y;el.dataset.mx=it.mx;el.dataset.my=it.my;el.style.left=it.x+'%';el.style.top=it.y+'%';el.style.animationDelay=(i*.15)+'s';el.style.setProperty('--islandA',it.a);el.style.setProperty('--islandB',it.b);el.innerHTML=`<div class="shadow"></div><div class="land"><div class="current-ring"></div><div class="num">${it.id}</div><span class="tree t1">🌴</span><span class="tree t2">🌳</span><span class="hut">${it.icon}</span><div class="lock">🔒</div></div><div class="avatar-here"><img src="assets/characters/zafri-main.svg" alt="Zafri"><div class="speech">Saya di sini!</div></div><div class="label"><b>${it.name}</b><span>${it.game}</span></div>`;if(open){el.addEventListener('mouseenter',()=>beep());el.addEventListener('click',()=>{localStorage.setItem('pulauJawiCurrentIsland',it.id);beep('ok')})}world.appendChild(el)});
function applyMapPositions(){const compact=window.matchMedia('(orientation:landscape) and (max-height:560px), (max-width:760px)').matches;document.querySelectorAll('.island').forEach(el=>{el.style.left=(compact?el.dataset.mx:el.dataset.x)+'%';el.style.top=(compact?el.dataset.my:el.dataset.y)+'%';});}
applyMapPositions();
window.addEventListener('resize',applyMapPositions);
document.getElementById('miniBtn').onclick=()=>document.body.classList.toggle('hidden-ui');
</script>
