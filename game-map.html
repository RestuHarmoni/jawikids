<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Peta Pulau Jawi</title><link rel="stylesheet" href="app.css"></head><body class="bg-bubbles"><div class="page"><header class="topbar"><a class="brand" href="index.html"><span class="brand-badge">🏝️</span><span class="brand-title"><b>Pulau Jawi</b><span>Peta Pengembaraan</span></span></a><nav class="nav-actions"><a class="btn" href="parent-dashboard.html">Dashboard</a><button class="btn btn-blue" onclick="document.body.classList.toggle('hide-ui')">Minimal View</button></nav></header><main class="shell map-wrap card"><div class="section-title" style="margin-top:0"><span class="eyebrow">🗺️ Pilih pulau</span><h2>Peta Dunia Pulau Jawi</h2><p>Ikut laluan dotted path. Setiap pulau ada kejutan bunyi, animasi dan reward.</p></div><div class="map-stage" id="mapStage"><div class="sun"></div><span class="sparkle s1">✨</span><span class="sparkle s2">🌟</span><span class="sparkle s3">💫</span><div class="sea-wave"></div></div></main><div class="quick-fab"><button class="btn btn-primary" onclick="document.body.classList.toggle('hide-ui')">☰</button></div></div><script src="js/pulau-jawi-data.js"></script><script src="js/pulau-jawi-effects.js"></script><script>const pos=[[6,13],[24,30],[46,13],[67,29],[82,48],[59,62],[37,49],[16,68],[42,79],[70,76]],stage=document.getElementById('mapStage');function line(a,b){let x1=pos[a][0]+7,y1=pos[a][1]+6,x2=pos[b][0]+7,y2=pos[b][1]+6,dx=x2-x1,dy=y2-y1,l=Math.sqrt(dx*dx+dy*dy),ang=Math.atan2(dy,dx)*180/Math.PI;let d=document.createElement('div');d.className='map-line';d.style.left=x1+'%';d.style.top=y1+'%';d.style.width=l+'%';d.style.transform=`rotate(${ang}deg)`;stage.appendChild(d)}for(let i=0;i<9;i++)line(i,i+1);PULAU_JAWI_DATA.islands.forEach((i,idx)=>{let a=document.createElement('a');a.className='map-island';a.href=`lesson-game.html?island=${i.id}`;a.style.left=pos[idx][0]+'%';a.style.top=pos[idx][1]+'%';a.style.setProperty('--c1',i.c1);a.style.setProperty('--c2',i.c2);a.innerHTML=`<div><div class="ico">${i.icon}</div><div>Pulau ${i.id}</div><small>${i.game}</small></div>`;a.onmouseenter=()=>playBlip();stage.appendChild(a)})</script></body></html>
