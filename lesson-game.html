<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Lesson Game - Pulau Jawi</title><link rel="stylesheet" href="app.css"></head><body>
<div class="wide-game">
  <main class="game-shell">
    <aside class="game-side card">
      <a class="brand" href="game-map.html"><span class="brand-badge">🏝️</span><span class="brand-title"><b>Pulau Jawi</b><span id="sideTitle">Game</span></span></a>
      <div style="text-align:center;margin-top:20px"><img src="assets/avatars/zafri/zafri-happy.svg" alt="Zafri" style="width:130px"><h3 id="islandName">Pulau</h3><p class="mini-note" id="skillText">Kemahiran</p></div>
      <div class="progress"><i id="bar" style="width:0%"></i></div><p class="mini-note"><span id="qCount">1</span> / 5 soalan</p>
      <a class="btn" href="game-map.html">← Peta</a>
    </aside>
    <section class="game-panel card">
      <div class="game-top"><div><b id="gameName">Game</b><div class="mini-note" id="instruction">Arahan</div></div><div class="hearts" id="hearts">❤️❤️❤️</div></div>
      <div class="question-box"><button class="btn btn-blue" onclick="speakCurrent()">🔊 Dengar Arahan</button><h1 id="prompt">Soalan</h1><div class="mini-note" id="feedback">Pilih jawapan yang betul.</div></div>
      <div class="options" id="options"></div>
    </section>
  </main>
</div>
<script src="js/pulau-jawi-data.js"></script><script>
const qs=new URLSearchParams(location.search);let islandId=parseInt(qs.get('island')||'1',10);let island=PULAU_JAWI_DATA.islands.find(x=>x.id===islandId)||PULAU_JAWI_DATA.islands[0];let idx=0,score=0,hearts=3,locked=false;
const $=id=>document.getElementById(id);
function tone(type){try{const ctx=new (window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.value=type==='ok'?740:180;g.gain.setValueAtTime(.001,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.16,ctx.currentTime+.02);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.16);o.start();o.stop(ctx.currentTime+.18)}catch(e){}}
function speak(t){try{speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(t);u.lang='ms-MY';u.rate=.88;u.pitch=1.15;speechSynthesis.speak(u)}catch(e){}}
function speakCurrent(){speak(island.questions[idx].voice||island.questions[idx].prompt)}
function render(){locked=false;const q=island.questions[idx];$('sideTitle').textContent=island.game;$('islandName').textContent=island.title;$('skillText').textContent=island.skill;$('gameName').textContent=island.icon+' '+island.game;$('instruction').textContent=island.instruction;$('prompt').textContent=q.prompt;$('feedback').textContent='Pilih jawapan yang betul.';$('hearts').textContent='❤️'.repeat(hearts)+'🤍'.repeat(3-hearts);$('qCount').textContent=idx+1;$('bar').style.width=(idx/island.questions.length*100)+'%';
const opts=[...q.options].sort(()=>Math.random()-.5);$('options').innerHTML='';opts.forEach(op=>{let b=document.createElement('button');b.className='option jawi';b.textContent=op;b.onclick=()=>answer(b,op);$('options').appendChild(b)});setTimeout(speakCurrent,350)}
function answer(btn,val){if(locked)return;locked=true;const q=island.questions[idx];if(val===q.answer){score++;btn.classList.add('correct');$('feedback').textContent='Hebat! Jawapan betul ⭐';tone('ok');speak('Hebat! Jawapan betul.')}else{hearts=Math.max(0,hearts-1);btn.classList.add('wrong');$('feedback').textContent='Cuba lagi. Jawapan betul ialah '+q.answer;tone('bad');speak('Cuba lagi. Jawapan betul ialah '+q.answer);[...document.querySelectorAll('.option')].find(x=>x.textContent===q.answer)?.classList.add('correct')}
setTimeout(()=>{idx++; if(idx>=island.questions.length||hearts<=0)finish();else render()},1200)}
function finish(){localStorage.setItem('pulauJawiLastIsland',island.id);let best=Number(localStorage.getItem('pulauJawiScore'+island.id)||0);if(score>best)localStorage.setItem('pulauJawiScore'+island.id,score);document.querySelector('.game-panel').innerHTML=`<div class="reward-screen"><div class="result-stars">${score>=4?'🌟🌟🌟':'🌟🌟'}</div><h1>${score>=4?'Tahniah Pendekar Kecil!':'Bagus, terus cuba!'}</h1><p><b>${island.title}</b><br>Skor: ${score}/${island.questions.length}</p><p class="mini-note">Reward: +${score*10} XP • Badge ${island.game}</p><div class="nav-actions" style="justify-content:center"><a class="btn btn-play" href="lesson-game.html?island=${Math.min(10,island.id+1)}">Pulau Seterusnya</a><a class="btn btn-blue" href="game-map.html">Kembali ke Peta</a><a class="btn" href="achievement.html">Pencapaian</a></div></div>`;$('bar')&&($('bar').style.width='100%');speak(score>=4?'Tahniah! Anda berjaya.':'Bagus. Mari cuba lagi.')}
render();
</script></body></html>
