<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Lesson Game - Pulau Jawi</title><link rel="stylesheet" href="app.css"></head><body><div class="wide-game"><main class="game-shell"><aside class="game-side card"><a class="brand" href="game-map.html"><span class="brand-badge">🏝️</span><span class="brand-title"><b>Pulau Jawi</b><span id="sideTitle">Game</span></span></a><div class="mascot-box"><img src="assets/avatars/zafri/zafri-happy.svg" alt="Zafri"><p id="guideText" class="mini-note">Dengar arahan, pilih jawapan, kumpul bintang!</p><button class="btn btn-primary" onclick="speakCurrent()">🔊 Ulang Suara</button></div><p class="mini-note" style="margin-top:14px">Tip: Untuk rasa app sebenar, cuba view landscape smartphone.</p><a class="btn" style="width:100%;margin-top:8px" href="game-map.html">← Peta</a></aside><section class="game-panel card"><div class="game-top"><div><span class="pill" id="islandPill">Pulau</span><h2 id="gameTitle" style="margin:8px 0 0">Game</h2></div><div style="text-align:right"><div class="hearts" id="hearts">💖💖💖</div><div class="mini-note">Skor <b id="score">0</b>/<span id="total">5</span></div></div></div><div class="progress" style="margin:14px 0"><i id="bar" style="width:0%"></i></div><div class="question-box"><div class="game-visual" id="visual">🎈</div><div class="mini-note" id="instruction">Arahan</div><h1 id="prompt">Soalan</h1><p class="mini-note" id="skill">Skill</p></div><div class="options" id="options"></div><div class="feedback" id="feedback"></div></section></main></div><script src="js/pulau-jawi-data.js"></script><script src="js/pulau-jawi-effects.js"></script><script>const $=id=>document.getElementById(id);const params=new URLSearchParams(location.search);const island=PULAU_JAWI_DATA.islands.find(x=>x.id===(Number(params.get('island'))||1))||PULAU_JAWI_DATA.islands[0];let idx=0,score=0,hearts=3,locked=false;$('sideTitle').textContent=island.title;$('gameTitle').textContent=island.game;$('islandPill').textContent='Pulau '+island.id+' • Umur '+island.age;$('instruction').textContent=island.instruction;$('skill').textContent=island.skill;$('total').textContent=island.questions.length;document.documentElement.style.setProperty('--theme1',island.c1);function speakCurrent(){const q=island.questions[idx];speak(q.voice||q.prompt)}function render(){locked=false;const q=island.questions[idx];$('visual').textContent=q.visual||island.icon;$('prompt').innerHTML=q.prompt;$('score').textContent=score;$('bar').style.width=(idx/island.questions.length*100)+'%';$('hearts').textContent='💖'.repeat(hearts)+'🤍'.repeat(3-hearts);$('feedback').textContent='';$('guideText').textContent=island.instruction;const wrap=$('options');wrap.innerHTML='';q.options.forEach((o,k)=>{const b=document.createElement('button');b.className='option jawi';b.textContent=o;b.onclick=()=>answer(b,o);b.onmouseenter=()=>playBlip();wrap.appendChild(b)});setTimeout(()=>{playMagic();speakCurrent()},350)}function answer(btn,val){if(locked)return;locked=true;const q=island.questions[idx];if(val===q.answer){score++;btn.classList.add('correct');$('feedback').textContent='Hebat! Betul! ⭐ +10 XP';playWin();speak('Hebat! Jawapan betul.')}else{hearts=Math.max(0,hearts-1);btn.classList.add('wrong');$('feedback').textContent='Cuba lagi. Jawapan betul ialah '+q.answer;playOops();speak('Cuba lagi. Jawapan betul ialah '+q.answer);[...document.querySelectorAll('.option')].find(x=>x.textContent===q.answer)?.classList.add('correct')}setTimeout(()=>{idx++; if(idx>=island.questions.length||hearts<=0)finish();else render()},1250)}function finish(){localStorage.setItem('pulauJawiLastIsland',island.id);let best=Number(localStorage.getItem('pulauJawiScore'+island.id)||0);if(score>best)localStorage.setItem('pulauJawiScore'+island.id,score);$('bar').style.width='100%';document.querySelector('.game-panel').innerHTML=`<div class="reward-screen"><div class="result-stars">${score>=4?'🌟🌟🌟':'🌟🌟'}</div><h1>${score>=4?'Tahniah Pendekar Kecil!':'Bagus, terus cuba!'}</h1><p><b>${island.title}</b><br>Skor: ${score}/${island.questions.length}</p><p class="mini-note">🎁 Reward: +${score*10} XP • Badge ${island.game} • Peti Harta Dibuka</p><div style="font-size:70px;margin:10px 0;animation:floaty 2s infinite">🎁</div><div class="nav-actions" style="justify-content:center"><a class="btn btn-play" href="lesson-game.html?island=${Math.min(10,island.id+1)}">Pulau Seterusnya</a><a class="btn btn-blue" href="game-map.html">Kembali ke Peta</a><a class="btn btn-primary" href="achievement.html">Pencapaian</a></div></div>`;confetti();playVictory();speak(score>=4?'Tahniah! Anda berjaya membuka peti harta.':'Bagus. Mari cuba lagi.')}render();</script></body></html>
