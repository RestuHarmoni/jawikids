<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Kata Laluan | JawiKids</title>
  <link rel="stylesheet" href="style.css?v=1.51.0" />
  <link rel="stylesheet" href="app.css?v=1.51.0" />

  <link rel="manifest" href="manifest.json?v=1.51.0">
  <meta name="theme-color" content="#A7E92F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="JawiKids">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.svg?v=1.51.0">
</head>
<body class="auth-page auth-premium-page">
  <main class="auth-shell auth-premium-shell single">
    <section class="auth-card auth-premium-card">
      <a class="brand-mini auth-brand" href="index.html">
        <span class="brand-badge">جا</span>
        <span><strong>JawiKids</strong><small>Main, Belajar, Bijak Jawi!</small></span>
      </a>
      <p class="eyebrow">Keselamatan Akaun</p>
      <h1>Lupa Kata Laluan?</h1>
      <p class="auth-subtitle">Masukkan email akaun parent. Kami akan hantar link reset kata laluan.</p>

      <div id="authMessage" class="auth-message" hidden></div>

      <form id="resetForm" class="auth-form">
        <label>Email
          <input id="email" type="email" autocomplete="email" placeholder="email@example.com" required />
        </label>
        <button id="resetBtn" class="btn btn-primary btn-full" type="submit">Hantar Link Reset</button>
      </form>

      <div class="auth-links">
        <a href="login.html">Kembali ke Log Masuk</a>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js?v=1.51.0"></script>
  <script src="js/auth.js?v=1.51.0"></script>
  <script>document.getElementById('resetForm').addEventListener('submit', JawiKidsAuth.forgotPassword);</script>

  <script src="pwa-register.js?v=1.51.0"></script>
<script src="js/orientation-reset.js?v=1.51.0"></script></body>
</html>
