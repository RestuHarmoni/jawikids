<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Kata Laluan | JawiKids</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="app.css" />
</head>
<body class="auth-page">
  <main class="auth-shell single">
    <section class="auth-card">
      <a class="brand-mini" href="index.html">🌙 JawiKids</a>
      <p class="eyebrow">Keselamatan Akaun</p>
      <h1>Lupa Kata Laluan?</h1>
      <p class="auth-subtitle">Masukkan email akaun parent. Kami akan hantar link reset kata laluan.</p>

      <div id="authMessage" class="auth-message" hidden></div>

      <form id="resetForm" class="auth-form">
        <label>Email
          <input id="email" type="email" autocomplete="email" placeholder="email@example.com" required />
        </label>
        <button id="resetBtn" class="btn btn-primary btn-full" type="submit">Hantar Link Reset</button>
      </form>

      <div class="auth-links">
        <a href="login.html">Kembali ke Log Masuk</a>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth.js"></script>
  <script>document.getElementById('resetForm').addEventListener('submit', JawiKidsAuth.forgotPassword);</script>
</body>
</html>
