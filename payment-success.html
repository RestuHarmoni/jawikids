<!doctype html>
<html lang="ms">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>JawiKids | Pembayaran Berjaya</title><link rel="stylesheet" href="style.css?v=1.50.0"><style>body{margin:0;font-family:Fredoka,Nunito,system-ui,sans-serif;background:#EBF8FF;color:#1E293B}.center{min-height:100vh;display:grid;place-items:center;padding:20px}.card{max-width:620px;background:white;border:3px solid #1E293B;border-radius:34px;padding:34px;text-align:center;box-shadow:0 18px 0 rgba(58,190,249,.18)}.icon{font-size:4rem}.btn{display:inline-block;margin-top:18px;background:#FFD93D;color:#1E293B;border:3px solid #1E293B;border-radius:20px;padding:15px 22px;text-decoration:none;font-weight:900;box-shadow:0 7px 0 #d4a90f}</style>
  <link rel="manifest" href="manifest.json?v=1.50.0">
  <meta name="theme-color" content="#A7E92F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="JawiKids">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.svg?v=1.50.0">
</head><body><main class="center"><section class="card"><div class="icon">🎉</div><h1>Pembayaran Berjaya!</h1><p>Premium Lifetime JawiKids telah diaktifkan. Anda boleh tambah profil anak dan mula bermain.</p><a href="parent-dashboard.html" class="btn">Masuk Portal Ibu Bapa</a></section></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="js/supabase-client.js?v=1.50.0"></script><script>
(async function(){
  const supabase = window.getJawiSupabase ? window.getJawiSupabase() : window.jawiSupabase;
  if(!supabase) return;
  const params = new URLSearchParams(window.location.search);
  const paymentId = params.get('payment_id') || params.get('order_id');
  const billCode = params.get('billcode') || params.get('billCode') || params.get('bill_code');
  const { data } = await supabase.auth.getUser();
  const user = data && data.user;
  if(!user) return;
  let query = supabase.from('payments').update({ status:'paid', paid_at:new Date().toISOString(), raw_payload:{ callback:Object.fromEntries(params.entries()), source:'payment-success.html' } });
  if(paymentId) query = query.eq('id', paymentId);
  else if(billCode) query = query.eq('toyyibpay_bill_code', billCode);
  else query = query.eq('user_id', user.id).eq('status','pending').order('created_at',{ascending:false}).limit(1);
  await query;
  const { data: latest } = await supabase.from('payments').select('max_children_after_payment').eq('user_id', user.id).eq('status','paid').order('created_at',{ascending:false}).limit(1).maybeSingle();
  const maxChildren = Math.max(3, Math.min(5, Number(latest && latest.max_children_after_payment || 3)));
  await supabase.from('profiles').update({ subscription_type:'premium_lifetime', subscription_status:'active', premium_lifetime:true, max_children:maxChildren, premium_activated_at:new Date().toISOString() }).eq('id', user.id);
})();
</script>
  <script src="pwa-register.js?v=1.50.0"></script>
<script src="js/orientation-reset.js?v=1.50.0"></script></body></html>
